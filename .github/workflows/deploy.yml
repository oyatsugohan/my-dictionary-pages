# 1. まずビルドを実行（dist フォルダが生成されます）
- name: Build
  run: npm run build

# 2. Pages専用のコマンドでデプロイを実行（修正箇所）
- name: Deploy to Cloudflare Pages
  run: npx wrangler pages deploy dist --project-name=my-dictionary-pages
  env:
    CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
